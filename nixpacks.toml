# Nixpacks configuration for Railway deployment
# See: https://nixpacks.com/docs/configuration/file

# Only use Node.js provider — disable auto-detected Caddy and Chromium
# Express already serves static files, so Caddy is not needed
providers = ["node"]

[variables]
# Suppress Caddy SPA auto-detection (triggered by index.html in project root)
NIXPACKS_SPA_CADDY = "false"
# Skip Playwright browser downloads during npm install (not needed in production)
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[phases.setup]
# Extend Node defaults (nodejs + npm auto-detected from .nvmrc) with openssl
nixPkgs = ["...", "openssl"]
# Do NOT install Chromium or browser system deps — only needed for E2E testing
aptPkgs = []

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build && npm run build:server"]

[start]
cmd = "NODE_ENV=production node dist-server/index.js"
