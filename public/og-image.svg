<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <!-- Decorative pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="900" cy="100" r="150" fill="rgba(255,255,255,0.02)"/>

  <!-- Logo icon (shield with AI) -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <!-- Shield shape -->
    <path d="M0 -80 L60 -50 L60 30 C60 70 0 100 0 100 C0 100 -60 70 -60 30 L-60 -50 Z"
          fill="white" opacity="0.95"/>
    <!-- AI text in shield -->
    <text x="0" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="48"
          font-weight="700" fill="#2563eb" text-anchor="middle">AI</text>
  </g>

  <!-- Main title -->
  <text x="600" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="white" text-anchor="middle" filter="url(#glow)">
    InsurAI
  </text>

  <!-- Tagline -->
  <text x="600" y="410" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    AI Sigorta Analiz Platformu
  </text>

  <!-- Feature pills -->
  <g transform="translate(600, 480)">
    <!-- Pill 1 -->
    <rect x="-340" y="-20" width="180" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="-250" y="8" font-family="system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">
      Yapay Zeka Analizi
    </text>

    <!-- Pill 2 -->
    <rect x="-90" y="-20" width="180" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">
      Eksik Teminatlar
    </text>

    <!-- Pill 3 -->
    <rect x="160" y="-20" width="180" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="250" y="8" font-family="system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">
      Piyasa Analizi
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="400" y="560" width="400" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Turkish flag colors accent (subtle) -->
  <rect x="0" y="626" width="1200" height="4" fill="#ef4444" opacity="0.8"/>
</svg>
