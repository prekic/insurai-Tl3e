<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - InsurAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #1d4ed8;
    }
    .retry-btn:active {
      background: #1e40af;
    }
    .status {
      margin-top: 24px;
      padding: 12px;
      background: #fef3c7;
      border-radius: 8px;
      color: #92400e;
      font-size: 14px;
    }
    .status.online {
      background: #d1fae5;
      color: #065f46;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="56" stroke="#e2e8f0" stroke-width="8"/>
      <path d="M40 60L55 75L80 45" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
      <path d="M35 50C35 50 45 35 60 35C75 35 85 50 85 50" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
      <path d="M45 65C45 65 50 55 60 55C70 55 75 65 75 65" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
      <circle cx="60" cy="80" r="6" fill="#64748b"/>
      <line x1="25" y1="25" x2="95" y2="95" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    </svg>

    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Don't worry - your data is safe. Once you're back online,
      you can continue where you left off.
    </p>

    <button class="retry-btn" onclick="retryConnection()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Try Again
    </button>

    <div id="status" class="status">
      Checking connection...
    </div>
  </div>

  <script>
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = 'Connection restored! Redirecting...';
        statusEl.classList.add('online');
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else {
        statusEl.textContent = 'Still offline. Please check your internet connection.';
        statusEl.classList.remove('online');
      }
    }

    function retryConnection() {
      updateStatus();
      if (!navigator.onLine) {
        // Try to fetch a small resource to verify connection
        fetch('/', { method: 'HEAD', cache: 'no-store' })
          .then(() => {
            window.location.reload();
          })
          .catch(() => {
            updateStatus();
          });
      }
    }

    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    // Initial check
    updateStatus();
  </script>
</body>
</html>
