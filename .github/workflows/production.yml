name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '22'
  VITE_SENTRY_ENVIRONMENT: production

# Ensure only one production deployment runs at a time
concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # SECRET SCAN - TruffleHog
  # ==========================================================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ==========================================================================
  # VALIDATE - Run tests and type checking
  # ==========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ==========================================================================
  # E2E TESTS - Run Playwright tests
  # ==========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check Supabase secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::warning title=Supabase Secrets Missing::PROD_SUPABASE_URL and/or PROD_SUPABASE_ANON_KEY not set. E2E tests will run without real Supabase integration."
          else
            echo "Supabase secrets configured — E2E tests will use real production instance."
          fi
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Run E2E tests against production build
        run: |
          npx serve dist -l 3000 --single &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test --project=chromium
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ==========================================================================
  # BUILD - Create production build
  # ==========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate, e2e-tests, secret-scan]
    if: |
      always() &&
      (needs.validate.result == 'success' || needs.validate.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.secret-scan.result == 'success' || needs.secret-scan.result == 'skipped')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN || '' }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || '' }}
          NODE_ENV: production
        run: npm run build

      - name: Build server
        run: npm run build:server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            dist/
            dist-server/
            package.json
            package-lock.json
          retention-days: 30

  # ==========================================================================
  # DEPLOY - Deploy to production (requires approval)
  # ==========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://insurai-production.up.railway.app
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build

      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        if: env.RAILWAY_TOKEN != ''
        run: sleep 30

      - name: Health check
        if: env.RAILWAY_TOKEN != ''
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://insurai-production.up.railway.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ needs.build.outputs.version }}

  # ==========================================================================
  # POST-DEPLOY - Notifications and cleanup
  # ==========================================================================
  post-deploy:
    name: Post-Deploy Tasks
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "::notice title=Deployment Successful::Production deployment completed successfully"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "::error title=Deployment Failed::Production deployment failed. Check logs for details."

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            Production deployment ${{ needs.deploy.result == 'success' && 'completed' || 'failed' }}
            Version: ${{ needs.build.outputs.version }}
            URL: https://insurai-production.up.railway.app
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ==========================================================================
  # ROLLBACK - Manual rollback job (workflow_dispatch only)
  # ==========================================================================
  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && failure()
    needs: deploy
    environment:
      name: production-rollback
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Trigger rollback
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::warning title=Rollback Initiated::Rolling back to previous deployment"
          railway service
          LAST_GOOD=$(railway deployment list --json 2>/dev/null | jq -r '.[1].id // empty')
          if [ -n "$LAST_GOOD" ]; then
            echo "Rolling back to deployment: $LAST_GOOD"
            railway rollback "$LAST_GOOD"
          else
            echo "::error title=Rollback Failed::Could not determine previous deployment. Manual rollback required."
            echo "Manual steps: 1) Go to Railway dashboard 2) Select previous deployment 3) Click Rollback"
            exit 1
          fi

      - name: Verify rollback health
        run: |
          sleep 30
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://insurai-production.up.railway.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "::notice title=Rollback Complete::Production has been rolled back and health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error title=Rollback Health Check Failed::Rollback deployed but health check failed after 5 attempts"
          exit 1
