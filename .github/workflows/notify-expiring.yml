name: Policy Expiry Notifications

on:
  schedule:
    # Runs daily at 08:00 UTC (11:00 Istanbul time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  notify:
    name: Send expiry push notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger notify-expiring endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SERVER_URL: ${{ secrets.PRODUCTION_SERVER_URL || 'https://insurai-production.up.railway.app' }}
        run: |
          echo "Calling $SERVER_URL/api/internal/cron/notify-expiring ..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SERVER_URL/api/internal/cron/notify-expiring")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response:    $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cron endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

          # Print a summary from the JSON response
          echo "$BODY" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f\"Total sent : {data.get('totalSent', 0)}\")
          print(f\"Total errors: {data.get('totalErrors', 0)}\")
          for days, w in data.get('windows', {}).items():
              print(f\"  {days}d window: found={w['found']} sent={w['sent']} errors={w['errors']}\")
          " 2>/dev/null || true
