name: Kasko Vehicle Extraction Smoke

on:
  # Manual trigger from the Actions UI.
  workflow_dispatch:

  # Preferred trigger: Railway posts a repository_dispatch event after a
  # successful deploy. See README "Smoke Tests" section for the curl wiring.
  repository_dispatch:
    types: [railway-deploy-success]

  # Fallback for when the Railway webhook isn't wired up yet — runs after
  # every push to main with a fixed sleep so production has time to redeploy.
  # Path-filtered (May 3, 2026 cost-controls): only fire on AI-pipeline-affecting
  # changes. Docs-only / unrelated-test PRs no longer burn ~$0.40 each.
  push:
    branches: [main]
    paths:
      - 'scripts/smoke-kasko.ts'
      - 'server/routes/ai/**'
      - 'src/lib/ai/**'
      - 'shared/extraction-schema.ts'
      - 'supabase/migrations/**'
      - 'tests/fixtures/kasko/**'

# Don't pile up runs — newest wins.
concurrency:
  group: smoke-kasko
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Railway redeploy (push trigger only)
        if: github.event_name == 'push'
        run: |
          echo "Waiting 150s for Railway to redeploy after merge to main..."
          sleep 150

      - name: Run kasko smoke
        id: smoke
        env:
          # Smoke runs in 2 steps against public AI endpoints — no DB poll, no
          # auth token needed. PRODUCTION_SERVER_URL is the only required
          # secret (already in repo).
          SMOKE_BASE_URL: ${{ secrets.PRODUCTION_SERVER_URL }}
        run: |
          set -o pipefail
          npm run smoke:kasko 2>&1 | tee smoke-output.log

      - name: Upload smoke output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output
          path: smoke-output.log
          retention-days: 14

      - name: Comment on most recent merged PR on failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let log = ''
            try {
              log = fs.readFileSync('smoke-output.log', 'utf8')
            } catch (err) {
              log = `(no log captured: ${err.message})`
            }
            // Tail the last ~3500 chars to fit comfortably in a comment
            const tail = log.length > 3500 ? '...\n' + log.slice(-3500) : log

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            })
            const merged = prs.data.find((p) => p.merged_at)
            if (!merged) {
              core.warning('No merged PR found to comment on — skipping')
              return
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body =
              `## ⚠ Kasko vehicle extraction smoke FAILED after merge\n\n` +
              `Triggered by: \`${context.eventName}\` on \`${context.sha.slice(0, 7)}\`\n` +
              `Workflow run: ${runUrl}\n\n` +
              `<details><summary>smoke output (tail)</summary>\n\n` +
              `\`\`\`\n${tail}\n\`\`\`\n\n` +
              `</details>\n\n` +
              `If this is a real regression, revert this PR or land a follow-up fix. ` +
              `If a fixture in \`tests/fixtures/kasko/fixtures.json\` is stale, update its ` +
              `\`expectedMake\`/\`expectedModel\`.`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: merged.number,
              body,
            })
