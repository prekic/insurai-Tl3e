# InsurAI Docker Compose - Staging Environment
# Run: docker-compose -f docker-compose.staging.yml up -d
#
# This configuration is optimized for staging deployments with:
# - Resource limits
# - Health checks
# - Logging configuration
# - Secrets from environment

version: '3.8'

services:
  # Combined frontend + backend
  app:
    build:
      context: .
      target: fullstack
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_PROXY_URL: ${VITE_API_PROXY_URL:-http://localhost:4001}
        VITE_APP_URL: ${VITE_APP_URL:-https://staging.insurai.app}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-staging}
    ports:
      - "80:80"
      - "4001:4001"
    environment:
      - NODE_ENV=staging
      - API_PORT=4001
      - FRONTEND_URL=${FRONTEND_URL:-https://staging.insurai.app}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CLOUD_API_KEY=${GOOGLE_CLOUD_API_KEY}
      # Rate limiting - more restrictive for staging
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=50
      - RATE_LIMIT_AI_WINDOW_MS=3600000
      - RATE_LIMIT_AI_MAX=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "app.environment=staging"
      - "app.name=insurai"

  # Optional: Redis for caching/sessions
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis_data:

networks:
  default:
    name: insurai-staging
